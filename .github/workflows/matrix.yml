name: Matrix Build

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: node -v
      - if: github.ref == 'refs/heads/main'
        run: echo "This only runs when the push is on main"
      - if: failure()
        run: echo "This only runs if a previous step failed"